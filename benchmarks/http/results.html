<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>rkt vs axum vs actix-web — Benchmarks</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f7f7f7; color: #222; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.3rem; }
    p.subtitle { color: #666; font-size: 0.88rem; margin-bottom: 2.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; color: #444;
                      margin: 2rem 0 1rem; border-left: 3px solid #ccc; padding-left: 0.6rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; max-width: 1100px; }
    .card { background: #fff; border-radius: 8px; padding: 1.5rem;
             box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    canvas { max-height: 320px; }
    .note { margin-top: 2rem; font-size: 0.78rem; color: #999; max-width: 1100px; }
  </style>
</head>
<body>
  <h1>rkt vs axum vs actix-web</h1>
  <p class="subtitle">Sequential oha runs &middot; 100 concurrent connections &middot; 30 s per scenario</p>

  <div class="section-title">API Scenarios</div>
  <div class="grid">
    <div class="card"><canvas id="api_rps"></canvas></div>
    <div class="card"><canvas id="api_p99"></canvas></div>
  </div>

  <div class="section-title">File Serving</div>
  <div class="grid">
    <div class="card"><canvas id="file_rps"></canvas></div>
    <div class="card"><canvas id="file_p99"></canvas></div>
  </div>

  <p class="note">
    Generated from <code>results/*.json</code> &middot;
    Higher req/s is better &middot; Lower p99 is better
  </p>

  <script>
    new Chart(document.getElementById('api_rps'), {
      type: 'bar',
      data: {
        labels: ["ping", "hello", "query", "headers", "state"],
        datasets: [{
          label: 'rkt',
          data: [178247, 169286, 148859, 113401, 164965],
          backgroundColor: 'rgba(220, 80,  60,  0.75)',
          borderColor: 'rgba(220, 80,  60,  1)',
          borderWidth: 1.5,
          borderRadius: 3
        },
      {
          label: 'axum',
          data: [227826, 223865, 216976, 135921, 177784],
          backgroundColor: 'rgba(60,  130, 220, 0.75)',
          borderColor: 'rgba(60,  130, 220, 1)',
          borderWidth: 1.5,
          borderRadius: 3
        },
      {
          label: 'actix',
          data: [260858, 253822, 244503, 253230, 153467],
          backgroundColor: 'rgba(60,  180, 100, 0.75)',
          borderColor: 'rgba(60,  180, 100, 1)',
          borderWidth: 1.5,
          borderRadius: 3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          title: { display: true, text: 'Requests / second', font: { size: 14, weight: 'bold' } },
          legend: { position: 'top' }
        },
        scales: {
          y: {
            beginAtZero: true,
            title: { display: true, text: 'req/s' }
          }
        }
      }
    });
    new Chart(document.getElementById('api_p99'), {
      type: 'bar',
      data: {
        labels: ["ping", "hello", "query", "headers", "state"],
        datasets: [{
          label: 'rkt',
          data: [1.98, 2.07, 2.29, 3.39, 2.14],
          backgroundColor: 'rgba(220, 80,  60,  0.75)',
          borderColor: 'rgba(220, 80,  60,  1)',
          borderWidth: 1.5,
          borderRadius: 3
        },
      {
          label: 'axum',
          data: [1.56, 1.58, 1.64, 2.28, 2.16],
          backgroundColor: 'rgba(60,  130, 220, 0.75)',
          borderColor: 'rgba(60,  130, 220, 1)',
          borderWidth: 1.5,
          borderRadius: 3
        },
      {
          label: 'actix',
          data: [3.03, 3.15, 3.22, 3.76, 4.39],
          backgroundColor: 'rgba(60,  180, 100, 0.75)',
          borderColor: 'rgba(60,  180, 100, 1)',
          borderWidth: 1.5,
          borderRadius: 3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          title: { display: true, text: 'P99 Latency (ms)', font: { size: 14, weight: 'bold' } },
          legend: { position: 'top' }
        },
        scales: {
          y: {
            beginAtZero: true,
            title: { display: true, text: 'ms' }
          }
        }
      }
    });
    new Chart(document.getElementById('file_rps'), {
      type: 'bar',
      data: {
        labels: ["file-small", "file-large"],
        datasets: [{
          label: 'rkt',
          data: [66806, 1124],
          backgroundColor: 'rgba(220, 80,  60,  0.75)',
          borderColor: 'rgba(220, 80,  60,  1)',
          borderWidth: 1.5,
          borderRadius: 3
        },
      {
          label: 'axum',
          data: [2837, 4385],
          backgroundColor: 'rgba(60,  130, 220, 0.75)',
          borderColor: 'rgba(60,  130, 220, 1)',
          borderWidth: 1.5,
          borderRadius: 3
        },
      {
          label: 'actix',
          data: [2487, 2618],
          backgroundColor: 'rgba(60,  180, 100, 0.75)',
          borderColor: 'rgba(60,  180, 100, 1)',
          borderWidth: 1.5,
          borderRadius: 3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          title: { display: true, text: 'Requests / second', font: { size: 14, weight: 'bold' } },
          legend: { position: 'top' }
        },
        scales: {
          y: {
            beginAtZero: true,
            title: { display: true, text: 'req/s' }
          }
        }
      }
    });
    new Chart(document.getElementById('file_p99'), {
      type: 'bar',
      data: {
        labels: ["file-small", "file-large"],
        datasets: [{
          label: 'rkt',
          data: [4.37, 154.97],
          backgroundColor: 'rgba(220, 80,  60,  0.75)',
          borderColor: 'rgba(220, 80,  60,  1)',
          borderWidth: 1.5,
          borderRadius: 3
        },
      {
          label: 'axum',
          data: [42.14, 56.37],
          backgroundColor: 'rgba(60,  130, 220, 0.75)',
          borderColor: 'rgba(60,  130, 220, 1)',
          borderWidth: 1.5,
          borderRadius: 3
        },
      {
          label: 'actix',
          data: [42.2, 130.54],
          backgroundColor: 'rgba(60,  180, 100, 0.75)',
          borderColor: 'rgba(60,  180, 100, 1)',
          borderWidth: 1.5,
          borderRadius: 3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          title: { display: true, text: 'P99 Latency (ms)', font: { size: 14, weight: 'bold' } },
          legend: { position: 'top' }
        },
        scales: {
          y: {
            beginAtZero: true,
            title: { display: true, text: 'ms' }
          }
        }
      }
    });
  </script>
</body>
</html>
